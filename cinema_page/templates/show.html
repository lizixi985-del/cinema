<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单号管理系统</title>
</head>
<body style="font-family: 'Microsoft YaHei', Arial, sans-serif; margin: 0; padding: 20px; background-color: #f5f7fa; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
    <div style="background-color: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 30px; width: 90%; max-width: 500px; text-align: center;">
        <h1 style="color: #2c3e50; margin-bottom: 30px;">单号管理页面</h1>
        
        <div style="background-color: #f8f9fa; border: 2px dashed #dee2e6; border-radius: 8px; padding: 20px; margin-bottom: 30px;">
            <p style="color: #6c757d; margin: 0 0 10px;">您的单号是：</p>
            <div id="ticketNumber" style="font-size: 32px; font-weight: bold; color: #3498db; letter-spacing: 2px; padding: 15px; background-color: #e8f4fc; border-radius: 6px; margin: 10px 0;">
               {% if ticketno %}
                 {{ticketno}}
                {% endif %}
            </div>
            <p style="color: #6c757d; font-size: 14px; margin: 10px 0 0;">请妥善保管此单号</p>
        </div>
        
        <div style="display: flex; justify-content: center; gap: 15px; margin-top: 20px;">
            <button onclick="copyToClipboard()" style="background-color: #3498db; color: white; border: none; border-radius: 5px; padding: 10px 20px; cursor: pointer; font-size: 16px; transition: background-color 0.3s;">
                复制单号
            </button>
        </div>
        <div style="display: flex; justify-content: center; gap: 15px; margin-top: 20px;">
            <a href="/find" class="back-btn" style="background-color: #3498db; color: white; border: none; border-radius: 5px; padding: 10px 20px; cursor: pointer; font-size: 16px; transition: background-color 0.3s;">
                <i class="fas fa-arrow-left"></i> 查询单子信息
            </a>
        </div>
        
        <div id="notification" style="margin-top: 20px; color: #27ae60; font-weight: bold; height: 24px;"></div>
    </div>

    <script>
        function copyToClipboard() {
            const ticketNumber = document.getElementById('ticketNumber').textContent;
            navigator.clipboard.writeText(ticketNumber).then(() => {
                showNotification('单号已复制到剪贴板！');
            });
        }
        
        function showNotification(message) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.style.opacity = '1';
            
            setTimeout(() => {
                notification.style.opacity = '0';
            }, 2000);
        }
    </script>
</body>
</html>
