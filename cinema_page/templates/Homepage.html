
{% extends "base.html" %}

{% block content %}

<style>
.info-section {
  margin: 20px 0;
}
.section-title {
  font-size: 18px;
  margin-bottom: 14px;
}
.cards-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}
.info-card {
  display: flex;
  align-items: center;
  background: #fff;
  border-radius: 10px;
  padding: 12px 14px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  gap: 12px;
}
.card-icon {
  font-size: 20px;
  line-height: 1;
}
.card-content {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.card-number {
  font-size: 20px;
  font-weight: 600;
  line-height: 1.2;
}
.card-tag {
  font-size: 12px;
  color: #666;
}
.card-label {
  font-size: 11px;
  color: #999;
}
</style>
<!-- 轮播Banner -->
<div class="banner-container">
    <div class="banner-slide active">
        <img src="https://picsum.photos/1920/400?random=2" alt="电影Banner1">
    </div>
    <div class="banner-slide">
        <img src="https://picsum.photos/1920/400?random=3" alt="电影Banner2">
    </div>
    <div class="banner-slide">
        <img src="https://picsum.photos/1920/400?random=4" alt="电影Banner3">
    </div>

    <button class="banner-arrow arrow-left">‹</button>
    <button class="banner-arrow arrow-right">›</button>

    <div class="banner-dots">
        <span class="dot active" data-index="0"></span>
        <span class="dot" data-index="1"></span>
        <span class="dot" data-index="2"></span>
    </div>
</div>

<!-- 系统信息卡片 -->
<section class="info-section">
    <h2 class="section-title">系统相关信息</h2>
    <div class="cards-grid">
        <div class="info-card">
            <div class="card-icon icon-movie">🎬</div>
            <div class="card-content">
                <div class="card-number">{{total}}</div>
                <div class="card-tag">总数量</div>
            </div>
        </div>
        <div class="info-card">
            <div class="card-icon icon-actor">👤</div>
            <div class="card-content">
                <div class="card-number">{{most_fre_actor}}</div>
                <div class="card-tag">最活跃演员</div>
            </div>
        </div>
        <div class="info-card">
            <div class="card-icon icon-country">🌐</div>
            <div class="card-content">
                <div class="card-number">{{most_fre_country}}</div>
                <div class="card-tag">最多产国家</div>
            </div>
        </div>
        <div class="info-card">
            <div class="card-icon icon-type">🎭</div>
            <div class="card-content">
                <div class="card-number">{{most_fre_type}}</div>
                <div class="card-tag">最受欢迎类型</div>
            </div>
        </div>
    </div>
</section>


<!--电影展示-->
<!--电影展示-->
<section class="info-section">
    <h2 class="section-title">电影展示</h2>
    <div class="cards-grid">
        {% for movie in random_movie %}
        <div class="info-card" style="flex-direction: column; align-items: flex-start; height: 100%; padding: 12px;">
            <!-- 图片容器：加背景色调试，确保容器可见 -->
            <div style="width: 100%; height: 180px; border-radius: 6px; overflow: hidden; margin-bottom: 8px; background: #f5f5f5;">
                <!-- 先测试固定图片，确认结构正常后再换回{{ movie[2] }} -->
                <img 
                    src="/proxy/douban-image?url={{ movie[2] }}" 
                    referrerpolicy="no-referrer"
                    crossorigin="anonymous"
                    style="width: 100%; height: 100%; object-fit: cover; display: block;"
                    alt="{{ movie[1] }}"
                    onerror="this.src='https://picsum.photos/400/600?grayscale'; this.alt='图片加载失败'"
                >
            </div>
            <!-- 电影信息 -->
            <div class="card-content" style="width: 100%;">
                <div class="card-number text-truncate" title="{{ movie[1] }}" style="font-size: 18px !important;">{{ movie[1] }}</div>
                <div class="card-tag d-flex align-items-center gap-1" style="margin-top: 4px;">
                    <i class="fas fa-star text-warning"></i> {{ movie[3] }}
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</section>
{% endblock %}
