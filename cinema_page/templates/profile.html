<!DOCTYPE html>
{% extends "base.html" %}

{% block content %}
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>个人资料修改</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container {
            width: 500px;
            margin: 50px auto;
            padding: 30px;
            border: 1px solid #eee;
            border-radius: 10px;
            box-shadow: 0 0 10px #f5f5f5;
        }
        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .item {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #666;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .avatar-box {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        #avatar-preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid #eee;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #409eff;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #337ecc;
        }
        /* 闪现提示 */
        .flash-success {
            background: #f0f9ff;
            color: #67c23a;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }
        .flash-error {
            background: #fef0f0;
            color: #f56c6c;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }
        .flash-warning {
            background: #fdf6ec;
            color: #e6a23c;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>个人资料修改</h2>

        <!-- 闪现消息提示 -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, msg in messages %}
                    <div class="flash-{{ category }}">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- 关键：文件上传必须加 enctype="multipart/form-data" -->
        <form method="post" enctype="multipart/form-data">
            <!-- 用户名 -->
            <div class="item">
                <label>用户名</label>
                <input type="text" name="username" value="{{ user.username }}" placeholder="不填写则不修改">
            </div>

            <!-- 邮箱 -->
            <div class="item">
                <label>邮箱</label>
                <input type="email" name="email" value="{{ user.email }}" placeholder="不填写则不修改">
            </div>

            <!-- 性别 -->
            <div class="item">
                <label>性别</label>
                <select name="gender">
                    <option value="">不修改</option>
                    <option value="男" {% if user.sex == '男' %}selected{% endif %}>男</option>
                    <option value="女" {% if user.sex == '女' %}selected{% endif %}>女</option>
                    <option value="保密" {% if user.sex == '保密' %}selected{% endif %}>保密</option>
                </select>
            </div>

            <!-- 年龄 -->
            <div class="item">
                <label>年龄</label>
                <input type="text" name="age" value="{{ user.age }}" placeholder="不填写则不修改">
            </div>

            <!-- 头像 -->
            <div class="item">
                <label>头像</label>
                <div class="avatar-box">
                    <!-- 原头像回显 -->
                    {% if user.avatar %}
                    <img id="avatar-preview" src="{{ user.avatar }}" alt="头像">
                    {% else %}
                    <img id="avatar-preview" src="/static/img/default.png" alt="默认头像">
                    {% endif %}
                    <input type="file" name="avatar" accept="image/*" onchange="previewAvatar(event)">
                </div>
            </div>

            <button type="submit">保存修改</button>
        </form>
    </div>

    <!-- 头像实时预览JS -->
    <script>
        function previewAvatar(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('avatar-preview').src = e.target.result;
                }
                reader.readAsDataURL(file);
            }
        }
    </script>
</body>
</html>
{% endblock content %}
