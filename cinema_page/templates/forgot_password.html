<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘记密码 - 密码重置请求</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&h=1080&q=85');
            background-size: cover;
            background-position: center 30%;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: #0a0f1c;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            padding: 1.5rem;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            pointer-events: none;
            z-index: 0;
        }

        .form-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(0px);
            border-radius: 32px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.4), 0 4px 12px rgba(0, 0, 0, 0.1);
            padding: 2.5rem 2rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .form-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .form-header h2 {
            font-size: 2rem;
            font-weight: 700;
            color: #1a2c3e;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .form-header p {
            font-size: 0.95rem;
            color: #5a6e82;
            line-height: 1.6;
            margin-top: 0.8rem;
        }

        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 1rem 1.2rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            color: #1565c0;
            line-height: 1.6;
        }

        .forgot-form {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .forgot-form label {
            font-size: 0.95rem;
            font-weight: 600;
            color: #1e2f3c;
            margin-top: 1rem;
            margin-bottom: 0.4rem;
        }

        .forgot-form label:first-of-type {
            margin-top: 0;
        }

        .forgot-form input[type="text"],
        .forgot-form input[type="email"],
        .forgot-form textarea {
            width: 100%;
            padding: 0.9rem 1.1rem;
            font-size: 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 24px;
            background-color: #ffffff;
            transition: all 0.2s ease;
            font-family: inherit;
            color: #0f2b3b;
            outline: none;
        }

        .forgot-form textarea {
            border-radius: 16px;
            min-height: 100px;
            resize: vertical;
        }

        .forgot-form input:focus,
        .forgot-form textarea:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .forgot-form input[type="submit"] {
            width: 100%;
            background: linear-gradient(105deg, #1f3a6b 0%, #2b4c7c 100%);
            color: white;
            font-size: 1.05rem;
            font-weight: 600;
            padding: 0.9rem 1rem;
            border: none;
            border-radius: 44px;
            margin-top: 1.5rem;
            cursor: pointer;
            transition: all 0.25s ease;
            letter-spacing: 0.8px;
            box-shadow: 0 6px 14px rgba(27, 55, 96, 0.3);
        }

        .forgot-form input[type="submit"]:hover {
            background: linear-gradient(105deg, #123256 0%, #1f3e62 100%);
            transform: translateY(-2px);
            box-shadow: 0 12px 22px rgba(0, 0, 0, 0.2);
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }

        .back-link a {
            color: #2196f3;
            text-decoration: none;
            font-weight: 600;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .form-container {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>
<div class="form-container">
    <div class="form-header">
        <h2>🔑 忘记密码</h2>
        <p>请填写以下信息，管理员将尽快处理您的密码重置请求</p>
    </div>

    <div class="info-box">
        ℹ️ 提交后，管理员会收到您的请求通知。请耐心等待管理员为您重置密码。
    </div>

    <form action="{{ url_for('create.forgot_password') }}" method="post" class="forgot-form">
        <label for="username">用户名 *</label>
        <input type="text" id="username" name="username" placeholder="请输入您的用户名" required>

        <label for="email">邮箱 *</label>
        <input type="email" id="email" name="email" placeholder="请输入您的注册邮箱" required>

        <label for="reason">请求原因（可选）</label>
        <textarea id="reason" name="reason" placeholder="例如：忘记密码、账号被盗等..."></textarea>

        <input type="submit" value="提交重置请求">
    </form>

    <div class="back-link">
        ← <a href="{{ url_for('create.login') }}">返回登录</a>
    </div>
</div>
</body>
</html>
