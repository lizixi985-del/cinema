<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>管理员登录 · 简约表单</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&h=1080&q=85');
            background-size: cover;
            background-position: center 30%;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: #0a0f1c;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            padding: 1.5rem;
            margin: 0;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            pointer-events: none;
            z-index: 0;
        }

        .form-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(0px);
            border-radius: 32px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.4), 0 4px 12px rgba(0, 0, 0, 0.1);
            padding: 2rem 1.8rem 2.2rem;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .form-header {
            text-align: center;
            margin-bottom: 1.8rem;
        }
        .form-header h2 {
            font-size: 1.9rem;
            font-weight: 700;
            color: #1a2c3e;
            letter-spacing: -0.2px;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .form-header h2 span {
            font-size: 1.8rem;
        }
        .form-header p {
            font-size: 0.85rem;
            color: #5a6e82;
            margin-top: 0.5rem;
            background: rgba(0,0,0,0.02);
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 0.1rem;
        }

        .login-form br {
            display: none;
        }

        .login-form label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #1e2f3c;
            margin-top: 0.8rem;
            margin-bottom: 0.25rem;
            letter-spacing: 0.2px;
        }

        .login-form label:first-of-type {
            margin-top: 0;
        }

        .login-form input[type="text"],
        .login-form input[type="password"] {
            width: 100%;
            padding: 0.85rem 1rem;
            font-size: 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 24px;
            background-color: #ffffff;
            transition: all 0.2s ease;
            font-family: inherit;
            color: #0f2b3b;
            outline: none;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
        }

        .login-form input[type="text"]:focus,
        .login-form input[type="password"]:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            background-color: #ffffff;
        }

        .login-form input[type="submit"] {
            width: 100%;
            background: linear-gradient(105deg, #1f3a6b 0%, #2b4c7c 100%);
            color: white;
            font-size: 1.05rem;
            font-weight: 600;
            padding: 0.85rem 1rem;
            border: none;
            border-radius: 44px;
            margin-top: 1.9rem;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: inherit;
            letter-spacing: 0.8px;
            box-shadow: 0 6px 14px rgba(27, 55, 96, 0.3);
        }

        .login-form input[type="submit"]:hover {
            background: linear-gradient(105deg, #123256 0%, #1f3e62 100%);
            transform: translateY(-2px);
            box-shadow: 0 12px 22px rgba(0, 0, 0, 0.2);
        }

        .login-form input[type="submit"]:active {
            transform: translateY(1px);
            transition: 0.05s;
        }

        .demo-hint {
            text-align: center;
            margin-top: 1.6rem;
            font-size: 0.7rem;
            color: #4b5f72;
            background: #f0f3f8c9;
            padding: 0.5rem 0.8rem;
            border-radius: 60px;
            width: 100%;
            backdrop-filter: blur(2px);
            font-weight: 500;
        }

        @media (max-width: 480px) {
            .form-container {
                padding: 1.6rem 1.2rem;
            }
            .login-form input[type="text"],
            .login-form input[type="password"] {
                padding: 0.75rem 0.9rem;
            }
            .form-header h2 {
                font-size: 1.6rem;
            }
        }

        .film-deco {
            display: none;
        }
    </style>
</head>
<body>
<div class="form-container">
    <div class="form-header">
        <h2>
            <span>🛠️</span> 管理员登录 <span>🔐</span>
        </h2>
        <p>后台入口 · 请先验证身份</p>
    </div>

    <form action="/admin/login" method="post" class="login-form" id="AdminLoginForm">
        <label for="name">用户名</label>
        <input type="text" id="name" name="name" placeholder="请输入管理员用户名" required>

        <br>

        <label for="password">密码</label>
        <input type="password" id="password" name="password" placeholder="请输入密码" required>

        <input type="submit" value="管理员登录">
    </form>

    <div class="demo-hint">
        当前与普通用户共用 userinfo 表，仅登录页标题和入口不同
    </div>
</div>

<script>
    (function() {
        const form = document.getElementById('AdminLoginForm');
        if (!form) return;

        form.addEventListener('submit', function(event) {
            if (!form.checkValidity()) {
                form.reportValidity();
                event.preventDefault();
                return;
            }
        });
    })();
</script>
</body>
</html>
