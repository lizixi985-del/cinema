<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>删除单子页面 - 双重确认</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            animation: fadeIn 0.6s ease-out;
            position: relative;
        }
        
        .header {
            background: #2c3e50;
            color: white;
            padding: 25px 30px;
            text-align: center;
            position: relative;
        }
        
        .header h2 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        
        .form-container {
            padding: 30px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
            font-size: 1rem;
        }
        
        .input-icon {
            position: relative;
        }
        
        .input-icon i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #7f8c8d;
        }
        
        input, select {
            width: 100%;
            padding: 14px 14px 14px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }
        
        input:focus, select:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }
        
        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 16px;
            cursor: pointer;
        }
        
        button[type="submit"] {
            width: 100%;
            padding: 15px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
            margin-top: 10px;
        }
        
        button[type="submit"]:hover {
            background: #c0392b;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(231, 76, 60, 0.6);
        }
        
        .back-btn {
            display: inline-block;
            width: 100%;
            padding: 12px;
            background: #f8f9fa;
            color: #2c3e50;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
            text-decoration: none;
            margin-top: 15px;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: #e9ecef;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            color: #7f8c8d;
            font-size: 0.85rem;
            border-top: 1px solid #eee;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 弹窗样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal {
            background: white;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transform: translateY(-20px);
            opacity: 0;
            transition: all 0.4s ease;
        }
        
        .modal-overlay.active .modal {
            transform: translateY(0);
            opacity: 1;
        }
        
        .modal-header {
            background: #e74c3c;
            color: white;
            padding: 20px;
            border-radius: 16px 16px 0 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .modal-header h3 {
            font-size: 1.4rem;
        }
        
        .modal-body {
            padding: 25px;
            text-align: center;
        }
        
        .modal-body p {
            font-size: 1.1rem;
            color: #2c3e50;
            margin-bottom: 25px;
            line-height: 1.6;
        }
        
        .modal-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        
        .modal-btn {
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }
        
        .modal-btn.confirm {
            background: #e74c3c;
            color: white;
        }
        
        .modal-btn.confirm:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }
        
        .modal-btn.cancel {
            background: #ecf0f1;
            color: #2c3e50;
        }
        
        .modal-btn.cancel:hover {
            background: #bdc3c7;
            transform: translateY(-2px);
        }
        
        @media (max-width: 600px) {
            .container {
                margin: 10px;
            }
            
            .header {
                padding: 20px;
            }
            
            .form-container {
                padding: 20px;
            }
            
            .modal-actions {
                flex-direction: column;
                gap: 10px;
            }
            
            .modal-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2><i class="fas fa-file-alt"></i>删除单子页面</h2>
        </div>
        
        <div class="form-container">
            <form id="deleteForm" method="post">
                <div class="form-group">
                    <label for="ticketno">单号</label>
                    <div class="input-icon">
                        <i class="fas fa-comment"></i>
                        <input type="text" id="ticketno" name="ticketno" placeholder="请输入要删除的单号" required>
                    </div>
                </div>
                
                <button type="button" id="deleteBtn" class="back-btn">
                    <i class="fas fa-trash-alt"></i> 确认删除
                </button>
            </form>
            
            <a href="/create" class="back-btn">
                <i class="fas fa-arrow-left"></i> 创建新单子
            </a>
        </div> 
        <div>
            {% if message %}
                 {{message}}
                {% endif %}
        </div>   
        <div class="footer">
            <p>©信息提交系统 | 技术支持</p>
        </div>
    </div>
    
    <!-- 确认删除弹窗 -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal">
            <div class="modal-header">
                <i class="fas fa-exclamation-triangle"></i>
                <h3>确认删除</h3>
            </div>
            <div class="modal-body">
                <p>您确定要删除单号为 <span id="ticketNumber" style="font-weight: bold; color: #e74c3c;"></span> 的单子吗？</p>
                <p style="font-size: 0.9rem; color: #e74c3c;">
                    <i class="fas fa-exclamation-circle"></i> 此操作不可撤销，请谨慎操作！
                </p>
                <div class="modal-actions">
                    <button class="modal-btn confirm" id="confirmDelete">
                        <i class="fas fa-check"></i> 确认删除
                    </button>
                    <button class="modal-btn cancel" id="cancelDelete">
                        <i class="fas fa-times"></i> 取消
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const deleteBtn = document.getElementById('deleteBtn');
            const confirmModal = document.getElementById('confirmModal');
            const confirmDeleteBtn = document.getElementById('confirmDelete');
            const cancelDeleteBtn = document.getElementById('cancelDelete');
            const ticketInput = document.getElementById('ticketno');
            const ticketNumberSpan = document.getElementById('ticketNumber');
            
            // 显示确认弹窗
            deleteBtn.addEventListener('click', function() {
                if (ticketInput.value.trim() === '') {
                    alert('请输入单号');
                    return;
                }
                
                // 显示要删除的单号
                ticketNumberSpan.textContent = ticketInput.value;
                
                // 显示弹窗
                confirmModal.classList.add('active');
            });
            
            // 确认删除操作
            confirmDeleteBtn.addEventListener('click', function() {
                // 这里可以添加真正的删除操作
                // 例如：
                document.getElementById('deleteForm').submit();
                
                // 显示成功消息（模拟）
                // alert(`单号 ${ticketInput.value} 已成功删除！`);
                
                // 重置表单
                ticketInput.value = '';
                
                // 关闭弹窗
                confirmModal.classList.remove('active');
            });
            
            // 取消删除操作
            cancelDeleteBtn.addEventListener('click', function() {
                confirmModal.classList.remove('active');
            });
            
            // 点击弹窗外部关闭
            confirmModal.addEventListener('click', function(e) {
                if (e.target === confirmModal) {
                    confirmModal.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
