<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工单创建系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #6e2ab7 0%, #2575fc 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .ticket-form {
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.25);
            padding: 40px;
            transition: transform 0.3s ease;
        }
        
        .ticket-form:hover {
            transform: translateY(-5px);
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 1.1rem;
        }
        
        .input-container {
            position: relative;
        }
        
        .input-container i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #6a11cb;
            font-size: 1.1rem;
        }
        
        input, select {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }
        
        input:focus, select:focus {
            border-color: #6a11cb;
            box-shadow: 0 0 0 3px rgba(106, 17, 203, 0.2);
        }
        
        input::placeholder {
            color: #aaa;
        }
        
        .urgency-option {
            display: flex;
            align-items: center;
            margin-top: 8px;
        }
        
        .urgency-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
        }
        
        .high .urgency-dot {
            background-color: #ff4757;
        }
        
        .medium .urgency-dot {
            background-color: #ffa502;
        }
        
        .low .urgency-dot {
            background-color: #2ed573;
        }
        
        .btn-submit {
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(37, 117, 252, 0.4);
        }
        
        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(37, 117, 252, 0.6);
        }
        
        .btn-submit:active {
            transform: translateY(1px);
        }
        
        .success-message {
            background: #2ed573;
            color: white;
            text-align: center;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 30px;
            font-size: 0.9rem;
        }
        
        @media (max-width: 576px) {
            .ticket-form {
                padding: 25px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>创建新工单</h1>
            <p>请填写工单信息并选择紧急程度</p>
        </div>
        
        <form id="ticketForm" class="ticket-form" method="post">
            <div class="form-group">
                <label for="description">问题描述</label>
                <div class="input-container">
                    <i class="fas fa-file-alt"></i>
                    <input type="text" id="description" placeholder="请输入简短的问题描述..." required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="urgency">紧急程度</label>
                <div class="input-container">
                    <i class="fas fa-exclamation-circle"></i>
                    <select id="urgency" required>
                        <option value="" disabled selected>请选择紧急程度</option>
                        <option value="1">1 - High (高)</option>
                        <option value="2">2 - Medium (中)</option>
                        <option value="3">3 - Low (低)</option>
                    </select>
                </div>
                
                <div class="urgency-option high">
                    <div class="urgency-dot"></div>
                    <span>High - 需要立即处理的关键问题</span>
                </div>
                
                <div class="urgency-option medium">
                    <div class="urgency-dot"></div>
                    <span>Medium - 重要但非紧急问题</span>
                </div>
                
                <div class="urgency-option low">
                    <div class="urgency-dot"></div>
                    <span>Low - 一般问题或功能请求</span>
                </div>
            </div>
            
            <button type="submit" class="btn-submit">提交工单</button>
        </form>
        
        <div id="successMessage" class="success-message">
            <i class="fas fa-check-circle fa-2x"></i>
            <h3>工单创建成功!</h3>
            <p>您的工单已成功提交，我们会尽快处理</p>
        </div>
        
        <div class="footer">
            <p>工单管理系统 | 技术支持</p>
        </div>
    </div>
    
    <script>
        document.getElementById('ticketForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // 获取表单数据
            const description = document.getElementById('description').value;
            const urgency = document.getElementById('urgency').value; 
            
            // 在实际应用中，这里会发送数据到服务器
            console.log('工单信息:', {
                description: description,
                urgency: urgency
            });
            
            // 显示成功消息
            const successMessage = document.getElementById('successMessage');
            successMessage.style.display = 'block';
            
            // 重置表单
            setTimeout(() => {
                this.reset();
                successMessage.style.display = 'none';
            }, 3000);
        });
        
        // 添加下拉菜单的交互效果
        const urgencySelect = document.getElementById('urgency');
        urgencySelect.addEventListener('change', function() {
            const selectedValue = this.value;
            const inputContainer = this.parentElement;
            
            // 重置所有颜色
            inputContainer.style.borderColor = '#e0e0e0';
            inputContainer.style.boxShadow = 'none';
            
            // 根据选择的值设置不同的样式
            if (selectedValue === '1') {
                inputContainer.style.borderColor = '#ff4757';
                inputContainer.style.boxShadow = '0 0 0 3px rgba(255, 71, 87, 0.2)';
            } else if (selectedValue === '2') {
                inputContainer.style.borderColor = '#ffa502';
                inputContainer.style.boxShadow = '0 0 0 3px rgba(255, 165, 2, 0.2)';
            } else if (selectedValue === '3') {
                inputContainer.style.borderColor = '#2ed573';
                inputContainer.style.boxShadow = '0 0 0 3px rgba(46, 213, 115, 0.2)';
            }
        });
    </script>
</body>
</html>
